  html, body {

    color: var(--ink);
    font-family: 'Cormorant Garamond', serif;
    min-height: 100vh;

  nav {
    padding: 1.5rem 2rem;
    display: flex;
    justify-content: space-between;
    align-items: center;

  nav .brand {
    font-family: 'Space Mono', monospace;
    font-size: 0.75rem;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--mute);
  }
  nav .brand a { color: var(--cyan); text-decoration: none; }
  nav .links a {
    color: var(--ink);
    text-decoration: none;
    margin-left: 1.5rem;
    font-family: 'Space Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    opacity: 0.7;
  }
  nav .links a:hover { color: var(--cyan); opacity: 1; }
  nav .links a.active { color: var(--cyan); opacity: 1; }
  
  .container {
    max-width: 700px;
    margin: 0 auto;
    padding: 4rem 2rem;
    text-align: center;
  }
  .date-stamp {
    font-family: 'Space Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 0.35em;
    color: var(--gold);
    text-transform: uppercase;
    margin-bottom: 1rem;
  }
  h1 {
    font-size: clamp(2.5rem, 7vw, 4rem);
    font-weight: 300;
    letter-spacing: 0.03em;
    margin-bottom: 2rem;
  }
  .sigil-wrap {
    position: relative;
    max-width: 400px;
    margin: 2rem auto;
  }
  .sigil-wrap img {
    width: 100%;
    aspect-ratio: 1;
    object-fit: contain;
    filter: drop-shadow(0 0 40px rgba(38, 228, 216, 0.25));
    animation: breathe 5s ease-in-out infinite;
  }
  @keyframes breathe {
    0%, 100% { transform: scale(1); filter: drop-shadow(0 0 40px rgba(38, 228, 216, 0.25)); }
    50% { transform: scale(1.03); filter: drop-shadow(0 0 60px rgba(38, 228, 216, 0.5)); }
  }
  .sigil-name {
    font-size: 2rem;
    font-weight: 400;
    margin-top: 2rem;
    letter-spacing: 0.02em;
  }
  .transmission {
    font-size: 1.25rem;
    color: var(--cyan);
    font-style: italic;
    margin: 1rem auto 2.5rem;
    max-width: 500px;
  }
  .meditation {
    font-size: 1.1rem;
    line-height: 1.7;
    color: var(--ink);
    max-width: 550px;
    margin: 0 auto 2rem;
    font-weight: 300;
  }
  .go-deeper {
    display: inline-block;
    margin-top: 1rem;
    padding: 0.9rem 1.8rem;
    border: 1px solid var(--cyan);
    color: var(--cyan);
    text-decoration: none;
    font-family: 'Space Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    transition: all 0.3s;
  }
  .go-deeper:hover {
    background: var(--cyan);
    color: var(--core-black);
  }
  .next {
    margin-top: 3rem;
    color: var(--mute);
    font-family: 'Space Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
  }
  footer {
    padding: 3rem 2rem;
    text-align: center;
    border-top: 1px solid rgba(38, 228, 216, 0.08);
    font-family: 'Space Mono', monospace;
    font-size: 0.7rem;
    color: var(--mute);
    letter-spacing: 0.1em;
    margin-top: 4rem;
  }
  footer a { color: var(--cyan); text-decoration: none; }

<nav>

</div>

<footer>
  <div>SIGILCRAFT · A RITE OF <a href="https://thefirstspark.shop">THE FIRST SPARK</a></div>

<script>

  },
  {

    file: 'you-are-the-proof.png',
    name: 'You Are the Proof',

// Seed by date so everyone sees the same sigil on the same day
function getDaySeed() {
  const d = new Date();
  const yyyy = d.getFullYear();
  const mm = (d.getMonth()+1).toString().padStart(2,'0');
  const dd = d.getDate().toString().padStart(2,'0');
  const s = yyyy + mm + dd;
  let h = 0;
  for (let i = 0; i < s.length; i++) h = (h * 31 + s.charCodeAt(i)) >>> 0;
  return h;
}

function render() {
  const seed = getDaySeed();
  const idx = seed % pool.length;
  const sigil = pool[idx];
  
  const d = new Date();
  const dateStr = d.toLocaleDateString('en-US', { weekday:'long', month:'long', day:'numeric', year:'numeric' });
  document.getElementById('dateStamp').textContent = '◊ ' + dateStr.toUpperCase() + ' ◊';
  
  document.getElementById('todaySigil').src = '/assets/sigils/' + sigil.file;
  document.getElementById('todaySigil').alt = sigil.name;
  if (sigil.file.includes('glitch') || sigil.file.includes('navy')) {
    document.getElementById('todaySigil').style.background = '#EAEAEA';
    document.getElementById('todaySigil').style.padding = '20px';
    document.getElementById('todaySigil').style.borderRadius = '8px';
  }
  document.getElementById('sigilName').textContent = sigil.name;
  document.getElementById('sigilTransmission').textContent = '"' + sigil.transmission + '"';
  document.getElementById('sigilMeditation').textContent = sigil.meditation;
  document.getElementById('goDeeper').href = '/sigils/' + sigil.id + '.html';
  
  // Next drop countdown
  const tomorrow = new Date(d);
  tomorrow.setDate(tomorrow.getDate() + 1);
  tomorrow.setHours(0, 0, 0, 0);
  const msLeft = tomorrow - d;
  const hoursLeft = Math.floor(msLeft / (1000 * 60 * 60));
  const minsLeft = Math.floor((msLeft % (1000 * 60 * 60)) / (1000 * 60));
  document.getElementById('nextDrop').textContent = `NEXT SIGIL DROPS IN ${hoursLeft}H ${minsLeft}M`;
}

render();
</script>
